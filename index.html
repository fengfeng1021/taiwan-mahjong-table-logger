<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#17211c" />
    <title>台麻牌桌記錄</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="台麻牌桌記錄工具">
      <header class="app-header">
        <div>
          <p class="eyebrow">Taiwan Mahjong Logger</p>
          <h1>台麻牌桌記錄</h1>
        </div>
        <div class="round-chip" id="stateChip">未開始</div>
      </header>

      <section class="setup-panel" aria-labelledby="setupTitle">
        <div class="panel-title-row">
          <h2 id="setupTitle">開局設定</h2>
          <button class="ghost-button compact" id="resetAllButton" type="button">清空</button>
        </div>

        <div class="setup-grid">
          <div>
            <div class="field-label">當前局牌</div>
            <div class="segmented compact-grid" id="roundMarkerGroup" aria-label="當前局牌"></div>
          </div>
          <div>
            <div class="field-label">我坐的位置</div>
            <div class="segmented seat-grid" id="seatGroup" aria-label="我的座位"></div>
          </div>
        </div>

        <div class="button-row">
          <button class="primary-button" id="startButton" type="button">開啟當前對局</button>
          <button class="secondary-button" id="nextRoundButton" type="button">下一局</button>
        </div>
      </section>

      <section class="status-strip" aria-live="polite">
        <div>
          <span class="field-label">目前輪到</span>
          <strong id="currentTurnText">先設定開局</strong>
        </div>
        <div>
          <span class="field-label">上一張</span>
          <strong id="lastDiscardText">無</strong>
        </div>
      </section>

      <section class="hand-panel" aria-labelledby="handTitle">
        <div class="panel-title-row">
          <h2 id="handTitle">我的手牌</h2>
          <button class="ghost-button compact" id="clearHandButton" type="button">清手牌</button>
        </div>
        <div class="my-hand" id="myHandList" aria-label="我的手牌"></div>
      </section>

      <section class="table-panel" aria-labelledby="riverTitle">
        <div class="panel-title-row">
          <h2 id="riverTitle">牌河</h2>
          <span class="hint-text">照實際出牌順序點牌</span>
        </div>
        <div class="players-grid" id="playersGrid"></div>
      </section>

      <section class="meld-panel" aria-labelledby="meldTitle">
        <div class="panel-title-row">
          <h2 id="meldTitle">吃碰槓</h2>
          <span class="hint-text" id="meldHint">上一張棄牌後可記錄</span>
        </div>
        <div class="meld-list" id="meldList"></div>
      </section>

      <section class="action-dock" aria-label="操作">
        <button class="dock-button" id="modeRiverButton" type="button">牌河</button>
        <button class="dock-button" id="modeHandButton" type="button">手牌</button>
        <button class="dock-button" id="chiButton" type="button">吃</button>
        <button class="dock-button" id="pongButton" type="button">碰</button>
        <button class="dock-button" id="kongButton" type="button">槓</button>
        <button class="dock-button" id="undoButton" type="button">撤回</button>
        <button class="dock-button copy" id="copyButton" type="button">複製</button>
      </section>

      <section class="tile-pad" aria-label="麻將牌選擇">
        <div class="tile-grid" id="tileGrid"></div>
      </section>
    </main>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="panel-title-row">
          <h2 id="modalTitle">選擇</h2>
          <button class="ghost-button compact" id="modalCloseButton" type="button">關閉</button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js" defer></script>
  </body>
</html>
